<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pastoreo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --rojo: #c0392b;
      --rojo-oscuro: #922b21;
      --rojo-claro: #e74c3c;
      --dorado: #f39c12;
      --verde: #27ae60;
      --negro: #0d0d0d;
      --gris-oscuro: #1a1a1a;
      --gris-medio: #2d2d2d;
      --gris-claro: #4a4a4a;
      --blanco: #fafafa;
      --texto-suave: #b0a090;
      --radio: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--negro);
      color: var(--blanco);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    /* ===== LOGIN ===== */
    .login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: radial-gradient(ellipse at 50% 20%, #3d0f0f 0%, var(--negro) 65%);
    }
    .logo-placeholder {
      width: 110px; height: 110px; border-radius: 50%;
      background: var(--rojo); display: flex; align-items: center;
      justify-content: center; font-size: 48px;
      box-shadow: 0 0 40px rgba(192,57,43,0.4); margin-bottom: 20px;
    }
    .app-title { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 900; }
    .app-subtitle { font-size: 13px; color: var(--texto-suave); letter-spacing: 3px; text-transform: uppercase; margin-top: 6px; }
    .login-card {
      background: var(--gris-oscuro); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radio); padding: 32px 28px; width: 100%; margin-top: 40px;
    }
    .login-card h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 8px; }
    .login-card p { color: var(--texto-suave); font-size: 14px; margin-bottom: 28px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--texto-suave); margin-bottom: 8px; }
    .input-group input, .input-group select {
      width: 100%; background: var(--gris-medio); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 14px 16px; color: var(--blanco);
      font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; transition: border-color 0.2s;
      appearance: none;
    }
    .input-group input:focus, .input-group select:focus { border-color: var(--rojo); }
    .btn-primary {
      width: 100%; background: var(--rojo); color: white; border: none;
      border-radius: 10px; padding: 16px; font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--rojo-claro); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3);
      border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #e74c3c; margin-top: 12px;
    }
    .success-msg {
      background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.3);
      border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #2ecc71; margin-top: 12px;
    }

    /* ===== HEADER ===== */
    .app-header {
      background: var(--gris-oscuro); border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 34px; height: 34px; border-radius: 50%; background: var(--rojo);
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .header-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; }
    .rol-badge {
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      padding: 3px 10px; border-radius: 20px; font-weight: 600;
    }
    .rol-pastor { background: rgba(192,57,43,0.2); color: var(--rojo-claro); border: 1px solid rgba(192,57,43,0.3); }
    .rol-hory { background: rgba(243,156,18,0.2); color: var(--dorado); border: 1px solid rgba(243,156,18,0.3); }
    .rol-nangareko { background: rgba(39,174,96,0.2); color: #2ecc71; border: 1px solid rgba(39,174,96,0.3); }
    .rol-lider_dc { background: rgba(52,152,219,0.2); color: #3498db; border: 1px solid rgba(52,152,219,0.3); }
    .btn-logout {
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      color: var(--texto-suave); border-radius: 8px; padding: 7px 12px;
      font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: var(--rojo); color: var(--rojo-claro); }

    /* ===== CONTENIDO ===== */
    .main-content { padding: 18px 18px 100px; }
    .welcome-banner {
      background: linear-gradient(135deg, var(--rojo-oscuro), var(--gris-medio));
      border-radius: var(--radio); padding: 22px; margin-bottom: 20px; position: relative; overflow: hidden;
    }
    .welcome-banner::after { content: '✝'; position: absolute; right: 18px; top: 50%; transform: translateY(-50%); font-size: 56px; opacity: 0.08; }
    .welcome-banner h2 { font-family: 'Playfair Display', serif; font-size: 21px; margin-bottom: 5px; }
    .welcome-banner p { color: rgba(255,255,255,0.7); font-size: 14px; }

    /* ===== TABS ===== */
    .tabs {
      display: flex; background: var(--gris-oscuro); border-radius: 12px;
      padding: 4px; margin-bottom: 20px; gap: 4px;
    }
    .tab {
      flex: 1; padding: 10px 8px; border: none; background: transparent;
      color: var(--texto-suave); font-family: 'DM Sans', sans-serif; font-size: 13px;
      font-weight: 500; border-radius: 9px; cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .tab.active { background: var(--rojo); color: white; }

    /* ===== MENÚ CARDS ===== */
    .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .menu-card {
      background: var(--gris-oscuro); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radio); padding: 20px 16px; cursor: pointer;
      transition: all 0.2s; text-align: center; display: flex;
      flex-direction: column; align-items: center; gap: 10px;
    }
    .menu-card:hover { border-color: var(--rojo); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(192,57,43,0.2); }
    .menu-card .icon { font-size: 32px; }
    .menu-card .card-title { font-size: 13px; font-weight: 600; }
    .menu-card .card-desc { font-size: 11px; color: var(--texto-suave); line-height: 1.4; }
    .menu-card-full { grid-column: 1 / -1; }

    /* ===== SECCIÓN ASISTENCIA ===== */
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .section-header h3 { font-family: 'Playfair Display', serif; font-size: 20px; }
    .btn-back {
      background: transparent; border: 1px solid rgba(255,255,255,0.1);
      color: var(--texto-suave); border-radius: 8px; padding: 8px 14px;
      font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .btn-back:hover { border-color: rgba(255,255,255,0.3); color: var(--blanco); }

    /* ===== SERVICIO SELECTOR ===== */
    .servicio-selector {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .servicio-btn {
      flex: 1; padding: 14px 10px; border: 2px solid rgba(255,255,255,0.08);
      background: var(--gris-oscuro); color: var(--texto-suave);
      border-radius: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; text-align: center; transition: all 0.2s;
    }
    .servicio-btn.active { border-color: var(--rojo); color: var(--blanco); background: rgba(192,57,43,0.15); }
    .servicio-btn .dia { font-size: 16px; margin-bottom: 4px; }
    .servicio-btn .hora { font-size: 11px; color: var(--texto-suave); margin-top: 2px; }

    /* ===== LISTA CONGREGANTES ===== */
    .search-input {
      width: 100%; background: var(--gris-medio); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 12px 16px; color: var(--blanco);
      font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
      margin-bottom: 14px; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--rojo); }

    .congregante-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--gris-oscuro); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; transition: all 0.2s;
    }
    .congregante-item.presente { border-color: rgba(39,174,96,0.3); background: rgba(39,174,96,0.05); }
    .congregante-left { display: flex; align-items: center; gap: 12px; }
    .congregante-foto {
      width: 42px; height: 42px; border-radius: 50%; background: var(--gris-medio);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; overflow: hidden; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.08);
    }
    .congregante-foto img { width: 100%; height: 100%; object-fit: cover; }
    .congregante-nombre { font-size: 14px; font-weight: 500; }
    .congregante-estado {
      font-size: 11px; color: var(--texto-suave); margin-top: 2px;
    }
    .estado-nuevo { color: #f39c12; }
    .estado-en_proceso { color: #3498db; }
    .estado-graduado { color: #2ecc71; }

    /* ===== SWITCH ===== */
    .switch { position: relative; display: inline-block; width: 50px; height: 28px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--gris-claro); transition: 0.3s; border-radius: 28px;
    }
    .slider:before {
      position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px;
      background: white; transition: 0.3s; border-radius: 50%;
    }
    input:checked + .slider { background: var(--verde); }
    input:checked + .slider:before { transform: translateX(22px); }

    /* ===== NUEVO INGRESO ===== */
    .nuevo-form {
      background: var(--gris-oscuro); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radio); padding: 24px;
    }
    .foto-upload {
      width: 80px; height: 80px; border-radius: 50%; background: var(--gris-medio);
      border: 2px dashed rgba(255,255,255,0.2); display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer;
      margin: 0 auto 20px; font-size: 24px; transition: all 0.2s;
    }
    .foto-upload:hover { border-color: var(--rojo); }
    .foto-upload span { font-size: 10px; color: var(--texto-suave); margin-top: 4px; }
    .foto-upload img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    /* ===== ESTADÍSTICAS ===== */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .stat-card {
      background: var(--gris-oscuro); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px; padding: 14px 10px; text-align: center;
    }
    .stat-numero { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; }
    .stat-label { font-size: 11px; color: var(--texto-suave); margin-top: 4px; }

    /* ===== INFO SECTION ===== */
    .info-section {
      background: var(--gris-oscuro); border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radio); padding: 20px; margin-bottom: 16px;
    }
    .info-section h3 { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--texto-suave); margin-bottom: 16px; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .label { color: var(--texto-suave); }

    /* ===== COMING SOON ===== */
    .coming-soon { text-align: center; padding: 48px 24px; color: var(--texto-suave); }
    .coming-soon .big-icon { font-size: 56px; margin-bottom: 16px; }
    .coming-soon h3 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--blanco); margin-bottom: 8px; }
    .coming-soon p { font-size: 14px; line-height: 1.6; }
    .tag-etapa {
      display: inline-block; background: rgba(192,57,43,0.15); border: 1px solid rgba(192,57,43,0.3);
      color: var(--rojo-claro); font-size: 11px; letter-spacing: 1px;
      padding: 4px 10px; border-radius: 20px; margin-top: 12px;
    }

    /* ===== LOADING ===== */
    .loading-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .spinner { width: 48px; height: 48px; border: 3px solid rgba(192,57,43,0.2); border-top-color: var(--rojo); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .setup-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; background: radial-gradient(ellipse at 50% 20%, #1a0a00 0%, var(--negro) 65%); }
    .setup-form { width: 100%; background: var(--gris-oscuro); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radio); padding: 28px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--verde); color: white; padding: 12px 24px;
      border-radius: 24px; font-size: 14px; font-weight: 500;
      z-index: 999; animation: fadeInUp 0.3s ease;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); white-space: nowrap;
    }
    .toast.error { background: var(--rojo); }

    /* ===== BADGE CONTADOR ===== */
    .badge-count {
      background: var(--rojo); color: white; font-size: 11px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px; margin-left: 6px;
    }

    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px) translateX(-50%); } to { opacity: 1; transform: translateY(0) translateX(-50%); } }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="app"></div>

<script type="module">
  const { createClient } = supabase;

  const SUPABASE_URL = 'https://wqojjgfeyyppfdsretid.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indxb2pqZ2ZleXlwcGZkc3JldGlkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Njk3NTUsImV4cCI6MjA5MjA0NTc1NX0.cN5mzaNTyRJuU1Af01QbOX_YIEBkAUGLJ3H-IYfbrMI';

  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let state = {
    loading: true,
    session: null,
    usuario: null,
    pantalla: 'home',
    // Hory state
    servicioActivo: 'domingo',
    congregantes: [],
    asistenciasHoy: {},
    busqueda: '',
    fotoNuevo: null,
    // Stats
    stats: { total: 0, presentes: 0, nuevos: 0 }
  };

  // ===== TOAST =====
  function mostrarToast(msg, tipo = 'ok') {
    const t = document.createElement('div');
    t.className = 'toast' + (tipo === 'error' ? ' error' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ===== RENDER =====
  function render() {
    const app = document.getElementById('app');
    if (state.loading) { app.innerHTML = renderLoading(); return; }
    if (!state.session) { app.innerHTML = renderLogin(); bindLogin(); return; }
    if (!state.usuario) { app.innerHTML = renderSetup(); bindSetup(); return; }

    app.innerHTML = `
      ${renderHeader()}
      <div class="main-content">
        ${renderPantalla()}
      </div>`;
    bindApp();
  }

  function renderLoading() {
    return `<div class="loading-screen"><div class="spinner"></div><p style="color:var(--texto-suave);font-size:14px">Cargando Pastoreo...</p></div>`;
  }

  // ===== LOGIN =====
  function renderLogin() {
    return `
      <div class="login-screen">
        <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:40px">
          <div class="logo-placeholder">🔥</div>
          <div class="app-title">Pastoreo</div>
          <div class="app-subtitle">Redención en Avivamiento</div>
        </div>
        <div class="login-card">
          <h2>Bienvenido</h2>
          <p>Ingresá con tus credenciales de líder</p>
          <div class="input-group"><label>Email</label><input type="email" id="email-input" placeholder="tu@email.com" /></div>
          <div class="input-group"><label>Contraseña</label><input type="password" id="pass-input" placeholder="••••••••" /></div>
          <button class="btn-primary" id="btn-login">Ingresar</button>
          <div id="login-error" style="display:none" class="error-msg"></div>
        </div>
      </div>`;
  }

  function bindLogin() {
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('login-error');
    async function doLogin() {
      const email = document.getElementById('email-input').value.trim();
      const pass = document.getElementById('pass-input').value;
      if (!email || !pass) { err.style.display='block'; err.textContent='Completá email y contraseña.'; return; }
      btn.disabled = true; btn.textContent = 'Ingresando...'; err.style.display='none';
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) { err.style.display='block'; err.textContent='Email o contraseña incorrectos.'; btn.disabled=false; btn.textContent='Ingresar'; }
    }
    btn.addEventListener('click', doLogin);
    document.getElementById('pass-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  }

  // ===== SETUP =====
  function renderSetup() {
    return `
      <div class="setup-screen">
        <div style="font-size:64px;margin-bottom:24px">👤</div>
        <h2 style="font-family:'Playfair Display',serif;font-size:26px;margin-bottom:12px">Completá tu perfil</h2>
        <p style="color:var(--texto-suave);font-size:14px;margin-bottom:32px;text-align:center">Primera vez ingresando.<br>Completá estos datos para continuar.</p>
        <div class="setup-form">
          <div class="input-group"><label>Tu nombre completo</label><input type="text" id="setup-nombre" placeholder="Nombre y apellido" /></div>
          <div class="input-group"><label>Tu rol</label>
            <select id="setup-rol">
              <option value="">Seleccioná tu rol</option>
              <option value="pastor">Pastor</option>
              <option value="hory">Hory (Asistencia)</option>
              <option value="nangareko">Ñangareko (Cuidador)</option>
              <option value="lider_dc">Líder DC</option>
            </select>
          </div>
          <button class="btn-primary" id="btn-setup">Guardar y continuar</button>
          <div id="setup-error" style="display:none" class="error-msg"></div>
        </div>
      </div>`;
  }

  function bindSetup() {
    document.getElementById('btn-setup').addEventListener('click', async () => {
      const nombre = document.getElementById('setup-nombre').value.trim();
      const rol = document.getElementById('setup-rol').value;
      const err = document.getElementById('setup-error');
      if (!nombre || !rol) { err.style.display='block'; err.textContent='Completá todos los campos.'; return; }
      const { error } = await sb.from('usuarios').upsert({ id: state.session.user.id, nombre, email: state.session.user.email, rol });
      if (error) { err.style.display='block'; err.textContent='Error: '+error.message; return; }
      await cargarUsuario(); render();
    });
  }

  // ===== HEADER =====
  function renderHeader() {
    const u = state.usuario;
    const rolLabel = { pastor:'Pastor', hory:'Hory', nangareko:'Ñangareko', lider_dc:'Líder DC' }[u.rol];
    return `
      <div class="app-header">
        <div class="header-left">
          <div class="header-icon">🔥</div>
          <div class="header-title">Pastoreo</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="rol-badge rol-${u.rol}">${rolLabel}</span>
          <button class="btn-logout" id="btn-logout">Salir</button>
        </div>
      </div>`;
  }

  // ===== PANTALLAS POR ROL =====
  function renderPantalla() {
    const rol = state.usuario.rol;
    if (state.pantalla === 'home') {
      if (rol === 'hory') return renderHomeHory();
      if (rol === 'pastor') return renderHomePastor();
      if (rol === 'nangareko') return renderHomeNangareko();
      if (rol === 'lider_dc') return renderHomeLiderDC();
    }
    if (state.pantalla === 'asistencia') return renderAsistencia();
    if (state.pantalla === 'nuevo-ingreso') return renderNuevoIngreso();
    return `<div class="coming-soon"><div class="big-icon">🚧</div><h3>Próximamente</h3><p>Esta sección estará disponible en la siguiente etapa.</p><div class="tag-etapa">En construcción</div></div>`;
  }

  // ===== HOME PASTOR =====
  function renderHomePastor() {
    const u = state.usuario;
    const hora = new Date().getHours();
    const saludo = hora < 12 ? 'Buenos días' : hora < 19 ? 'Buenas tardes' : 'Buenas noches';
    return `
      <div class="welcome-banner">
        <h2>${saludo}, ${u.nombre.split(' ')[0]} 👋</h2>
        <p>Estás ingresado como <strong>Pastor</strong></p>
      </div>
      <div class="menu-grid">
        <div class="menu-card" onclick="irA('dashboard')"><div class="icon">📊</div><div class="card-title">Dashboard</div><div class="card-desc">Estadísticas generales</div></div>
        <div class="menu-card" onclick="irA('lideres')"><div class="icon">👥</div><div class="card-title">Líderes</div><div class="card-desc">Fichas y seguimiento</div></div>
        <div class="menu-card" onclick="irA('congregantes')"><div class="icon">🏛️</div><div class="card-title">Congregación</div><div class="card-desc">Ver todos los miembros</div></div>
        <div class="menu-card" onclick="irA('alertas')"><div class="icon">🔔</div><div class="card-title">Alertas</div><div class="card-desc">Notificaciones</div></div>
        <div class="menu-card menu-card-full" onclick="irA('calendario')"><div class="icon">📅</div><div class="card-title">Calendario de encuentros</div><div class="card-desc">Agendá reuniones con tus líderes</div></div>
      </div>
      <div class="info-section">
        <h3>Tu perfil</h3>
        <div class="info-row"><span class="label">Nombre</span><span>${u.nombre}</span></div>
        <div class="info-row"><span class="label">Email</span><span style="font-size:13px">${u.email}</span></div>
        <div class="info-row"><span class="label">Rol</span><span>Pastor</span></div>
      </div>`;
  }

  // ===== HOME HORY =====
  function renderHomeHory() {
    const u = state.usuario;
    const hora = new Date().getHours();
    const saludo = hora < 12 ? 'Buenos días' : hora < 19 ? 'Buenas tardes' : 'Buenas noches';
    const hoy = new Date();
    const diaSemana = hoy.getDay();
    const esServicio = diaSemana === 3 || diaSemana === 0;
    const tipoServicio = diaSemana === 3 ? 'Miércoles' : diaSemana === 0 ? 'Domingo' : '';

    return `
      <div class="welcome-banner">
        <h2>${saludo}, ${u.nombre.split(' ')[0]} 👋</h2>
        <p>Panel del <strong>Hory</strong> — Asistencias</p>
      </div>

      ${esServicio ? `
        <div style="background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
          <span style="font-size:24px">🟢</span>
          <div>
            <div style="font-size:14px;font-weight:600;color:#2ecc71">¡Hoy hay servicio!</div>
            <div style="font-size:12px;color:var(--texto-suave)">Servicio del ${tipoServicio}</div>
          </div>
        </div>` : `
        <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
          <span style="font-size:24px">📅</span>
          <div>
            <div style="font-size:14px;font-weight:500">Próximos servicios</div>
            <div style="font-size:12px;color:var(--texto-suave)">Miércoles 19:30 · Domingo 09:00</div>
          </div>
        </div>`}

      <div class="menu-grid">
        <div class="menu-card menu-card-full" onclick="cambiarPantalla('asistencia')">
          <div class="icon">✅</div>
          <div class="card-title">Tomar asistencia</div>
          <div class="card-desc">Marcá presentes y ausentes del servicio de hoy</div>
        </div>
        <div class="menu-card menu-card-full" onclick="cambiarPantalla('nuevo-ingreso')">
          <div class="icon">➕</div>
          <div class="card-title">Nuevo ingreso</div>
          <div class="card-desc">Registrá a alguien que viene por primera vez</div>
        </div>
      </div>

      <div id="stats-hory">
        <div style="text-align:center;color:var(--texto-suave);font-size:13px;padding:20px">Cargando estadísticas...</div>
      </div>`;
  }

  // ===== HOME ÑANGAREKO =====
  function renderHomeNangareko() {
    const u = state.usuario;
    return `
      <div class="welcome-banner">
        <h2>Hola, ${u.nombre.split(' ')[0]} 👋</h2>
        <p>Panel del <strong>Ñangareko</strong></p>
      </div>
      <div class="menu-grid">
        <div class="menu-card menu-card-full" onclick="irA('alerta-nangareko')"><div class="icon">🚨</div><div class="card-title">Alerta Ñangareko</div><div class="card-desc">Nuevos sin asignar</div></div>
        <div class="menu-card menu-card-full" onclick="irA('mis-cuidados')"><div class="icon">🤝</div><div class="card-title">Mis cuidados</div><div class="card-desc">Personas que estás discipulando</div></div>
        <div class="menu-card" onclick="irA('fichas')"><div class="icon">📋</div><div class="card-title">Fichas</div><div class="card-desc">Registro de contactos</div></div>
        <div class="menu-card" onclick="irA('alertas')"><div class="icon">🔔</div><div class="card-title">Alertas</div><div class="card-desc">Recordatorios</div></div>
      </div>
      <div class="coming-soon"><div class="big-icon">🚧</div><h3>Etapa 3</h3><p>Las funciones del Ñangareko se activan en la próxima etapa.</p><div class="tag-etapa">Próximamente</div></div>`;
  }

  // ===== HOME LIDER DC =====
  function renderHomeLiderDC() {
    const u = state.usuario;
    return `
      <div class="welcome-banner">
        <h2>Hola, ${u.nombre.split(' ')[0]} 👋</h2>
        <p>Panel del <strong>Líder DC</strong></p>
      </div>
      <div class="menu-grid">
        <div class="menu-card menu-card-full" onclick="irA('asistencia-dc')"><div class="icon">✅</div><div class="card-title">Asistencia del DC</div><div class="card-desc">Marcá presentes en tu grupo</div></div>
        <div class="menu-card menu-card-full" onclick="irA('mi-grupo')"><div class="icon">🏠</div><div class="card-title">Mi grupo DC</div><div class="card-desc">Integrantes y fichas</div></div>
        <div class="menu-card" onclick="irA('fichas-dc')"><div class="icon">📋</div><div class="card-title">Fichas</div><div class="card-desc">Contactos privados</div></div>
        <div class="menu-card" onclick="irA('alertas')"><div class="icon">🔔</div><div class="card-title">Alertas</div><div class="card-desc">Ausencias</div></div>
      </div>
      <div class="coming-soon"><div class="big-icon">🚧</div><h3>Etapa 4</h3><p>Las funciones del Líder DC se activan en la etapa 4.</p><div class="tag-etapa">Próximamente</div></div>`;
  }

  // ===== PANTALLA ASISTENCIA =====
  function renderAsistencia() {
    const hoy = new Date().toLocaleDateString('es-PY', { weekday:'long', day:'numeric', month:'long' });
    const filtrados = state.congregantes.filter(c =>
      c.nombre.toLowerCase().includes(state.busqueda.toLowerCase())
    );
    const presentes = Object.values(state.asistenciasHoy).filter(Boolean).length;

    return `
      <div class="section-header">
        <h3>Asistencia</h3>
        <button class="btn-back" onclick="cambiarPantalla('home')">← Volver</button>
      </div>

      <div class="servicio-selector">
        <div class="servicio-btn ${state.servicioActivo==='miercoles'?'active':''}" onclick="cambiarServicio('miercoles')">
          <div class="dia">📖</div>
          <div>Miércoles</div>
          <div class="hora">19:30</div>
        </div>
        <div class="servicio-btn ${state.servicioActivo==='domingo'?'active':''}" onclick="cambiarServicio('domingo')">
          <div class="dia">⛪</div>
          <div>Domingo</div>
          <div class="hora">09:00</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-numero">${state.congregantes.length}</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-numero" style="color:var(--verde)">${presentes}</div>
          <div class="stat-label">Presentes</div>
        </div>
        <div class="stat-card">
          <div class="stat-numero" style="color:var(--rojo-claro)">${state.congregantes.length - presentes}</div>
          <div class="stat-label">Ausentes</div>
        </div>
      </div>

      <input class="search-input" type="text" placeholder="🔍 Buscar congregante..." 
        value="${state.busqueda}" oninput="filtrarBusqueda(this.value)" />

      <div id="lista-congregantes">
        ${filtrados.length === 0 ? 
          `<div style="text-align:center;color:var(--texto-suave);padding:32px;font-size:14px">
            ${state.congregantes.length === 0 ? 'No hay congregantes registrados aún.' : 'No se encontraron resultados.'}
          </div>` :
          filtrados.map(c => {
            const presente = state.asistenciasHoy[c.id] || false;
            const iniciales = c.nombre.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
            return `
              <div class="congregante-item ${presente?'presente':''}" id="item-${c.id}">
                <div class="congregante-left">
                  <div class="congregante-foto">
                    ${c.foto_url ? `<img src="${c.foto_url}" alt="${c.nombre}" />` : iniciales}
                  </div>
                  <div>
                    <div class="congregante-nombre">${c.nombre}</div>
                    <div class="congregante-estado estado-${c.estado}">${estadoLabel(c.estado)}</div>
                  </div>
                </div>
                <label class="switch">
                  <input type="checkbox" ${presente?'checked':''} onchange="toggleAsistencia('${c.id}', this.checked)" />
                  <span class="slider"></span>
                </label>
              </div>`;
          }).join('')
        }
      </div>`;
  }

  function estadoLabel(estado) {
    const labels = { nuevo:'✨ Nuevo', en_proceso:'🔵 En proceso', en_anua:'📚 En Añua', bautizado:'💧 Bautizado', en_dc:'🏠 En DC', graduado:'🎓 Graduado', visita:'👋 Visita' };
    return labels[estado] || estado;
  }

  // ===== PANTALLA NUEVO INGRESO =====
  function renderNuevoIngreso() {
    return `
      <div class="section-header">
        <h3>Nuevo ingreso</h3>
        <button class="btn-back" onclick="cambiarPantalla('home')">← Volver</button>
      </div>

      <div class="nuevo-form">
        <div style="text-align:center;margin-bottom:20px">
          <div class="foto-upload" id="foto-upload-btn" onclick="document.getElementById('foto-input').click()">
            <div id="foto-preview">📷</div>
            <span>Foto (opcional)</span>
          </div>
          <input type="file" id="foto-input" accept="image/*" style="display:none" onchange="previsualizarFoto(this)" />
        </div>

        <div class="input-group">
          <label>Nombre completo *</label>
          <input type="text" id="nuevo-nombre" placeholder="Nombre y apellido" />
        </div>
        <div class="input-group">
          <label>Teléfono (opcional)</label>
          <input type="tel" id="nuevo-telefono" placeholder="0981 000 000" />
        </div>
        <div class="input-group">
          <label>Servicio en el que ingresó</label>
          <select id="nuevo-servicio">
            <option value="domingo">Domingo 09:00</option>
            <option value="miercoles">Miércoles 19:30</option>
          </select>
        </div>

        <button class="btn-primary" id="btn-guardar-nuevo">Registrar nuevo ingreso</button>
        <div id="nuevo-error" style="display:none" class="error-msg"></div>
        <div id="nuevo-exito" style="display:none" class="success-msg"></div>
      </div>`;
  }

  // ===== FUNCIONES HORY =====
  window.cambiarServicio = async function(servicio) {
    state.servicioActivo = servicio;
    await cargarAsistenciasHoy();
    render();
  };

  window.filtrarBusqueda = function(valor) {
    state.busqueda = valor;
    const filtrados = state.congregantes.filter(c => c.nombre.toLowerCase().includes(valor.toLowerCase()));
    const lista = document.getElementById('lista-congregantes');
    if (!lista) return;
    const presentes = Object.values(state.asistenciasHoy).filter(Boolean).length;

    lista.innerHTML = filtrados.length === 0 ?
      `<div style="text-align:center;color:var(--texto-suave);padding:32px;font-size:14px">No se encontraron resultados.</div>` :
      filtrados.map(c => {
        const presente = state.asistenciasHoy[c.id] || false;
        const iniciales = c.nombre.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
        return `
          <div class="congregante-item ${presente?'presente':''}" id="item-${c.id}">
            <div class="congregante-left">
              <div class="congregante-foto">${c.foto_url ? `<img src="${c.foto_url}" />` : iniciales}</div>
              <div>
                <div class="congregante-nombre">${c.nombre}</div>
                <div class="congregante-estado estado-${c.estado}">${estadoLabel(c.estado)}</div>
              </div>
            </div>
            <label class="switch">
              <input type="checkbox" ${presente?'checked':''} onchange="toggleAsistencia('${c.id}', this.checked)" />
              <span class="slider"></span>
            </label>
          </div>`;
      }).join('');
  };

  window.toggleAsistencia = async function(congreganteId, presente) {
    state.asistenciasHoy[congreganteId] = presente;

    // Actualizar UI inmediatamente
    const item = document.getElementById('item-' + congreganteId);
    if (item) item.className = 'congregante-item' + (presente ? ' presente' : '');

    // Actualizar stats
    const presentes = Object.values(state.asistenciasHoy).filter(Boolean).length;
    const statsEls = document.querySelectorAll('.stat-numero');
    if (statsEls[1]) statsEls[1].textContent = presentes;
    if (statsEls[2]) statsEls[2].textContent = state.congregantes.length - presentes;

    const hoy = new Date().toISOString().split('T')[0];
    const { error } = await sb.from('asistencias').upsert({
      congregante_id: congreganteId,
      tipo_servicio: state.servicioActivo,
      fecha: hoy,
      presente: presente,
      registrado_por: state.usuario.id
    }, { onConflict: 'congregante_id,tipo_servicio,fecha' });

    if (error) {
      mostrarToast('Error al guardar', 'error');
      state.asistenciasHoy[congreganteId] = !presente;
    } else {
      mostrarToast(presente ? '✅ Marcado presente' : '❌ Marcado ausente');
    }
  };

  window.previsualizarFoto = function(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        state.fotoNuevo = e.target.result;
        const preview = document.getElementById('foto-preview');
        if (preview) preview.innerHTML = `<img src="${e.target.result}" style="width:80px;height:80px;object-fit:cover;border-radius:50%" />`;
        const btn = document.getElementById('foto-upload-btn');
        if (btn) btn.querySelector('span').textContent = 'Cambiar foto';
      };
      reader.readAsDataURL(input.files[0]);
    }
  };

  // ===== CARGAR DATOS =====
  async function cargarCongregantes() {
    const { data } = await sb.from('congregantes').select('*').order('nombre');
    state.congregantes = data || [];
  }

  async function cargarAsistenciasHoy() {
    const hoy = new Date().toISOString().split('T')[0];
    const { data } = await sb.from('asistencias')
      .select('congregante_id, presente')
      .eq('tipo_servicio', state.servicioActivo)
      .eq('fecha', hoy);
    state.asistenciasHoy = {};
    (data || []).forEach(a => { state.asistenciasHoy[a.congregante_id] = a.presente; });
  }

  async function cargarStatsHory() {
    const el = document.getElementById('stats-hory');
    if (!el) return;
    const hoy = new Date().toISOString().split('T')[0];
    const { data: asist } = await sb.from('asistencias').select('presente').eq('fecha', hoy);
    const presentes = (asist || []).filter(a => a.presente).length;
    const nuevos = state.congregantes.filter(c => c.estado === 'nuevo').length;
    el.innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-numero">${state.congregantes.length}</div><div class="stat-label">Congregantes</div></div>
        <div class="stat-card"><div class="stat-numero" style="color:var(--verde)">${presentes}</div><div class="stat-label">Hoy presentes</div></div>
        <div class="stat-card"><div class="stat-numero" style="color:var(--dorado)">${nuevos}</div><div class="stat-label">Nuevos</div></div>
      </div>`;
  }

  // ===== BIND APP =====
  function bindApp() {
    document.getElementById('btn-logout')?.addEventListener('click', async () => { await sb.auth.signOut(); });

    // Nuevo ingreso
    const btnGuardar = document.getElementById('btn-guardar-nuevo');
    if (btnGuardar) {
      btnGuardar.addEventListener('click', async () => {
        const nombre = document.getElementById('nuevo-nombre')?.value.trim();
        const telefono = document.getElementById('nuevo-telefono')?.value.trim();
        const err = document.getElementById('nuevo-error');
        const exito = document.getElementById('nuevo-exito');
        if (!nombre) { err.style.display='block'; err.textContent='El nombre es obligatorio.'; return; }
        btnGuardar.disabled = true; btnGuardar.textContent = 'Guardando...';
        err.style.display = 'none';

        const { data: nuevo, error } = await sb.from('congregantes').insert({
          nombre, telefono: telefono || null, estado: 'nuevo'
        }).select().single();

        if (error) {
          err.style.display='block'; err.textContent='Error al guardar: '+error.message;
          btnGuardar.disabled=false; btnGuardar.textContent='Registrar nuevo ingreso';
          return;
        }

        // Crear alerta para Ñangarekos
        const { data: nangarekos } = await sb.from('usuarios').select('id').eq('rol', 'nangareko');
        if (nangarekos && nangarekos.length > 0) {
          const alertas = nangarekos.map(n => ({
            usuario_id: n.id,
            congregante_id: nuevo.id,
            tipo: 'nuevo_ingreso',
            mensaje: `${nombre} ingresó por primera vez`
          }));
          await sb.from('alertas').insert(alertas);
        }

        await cargarCongregantes();
        exito.style.display='block';
        exito.textContent=`✅ ${nombre} registrado correctamente. Se notificó a los Ñangarekos.`;
        document.getElementById('nuevo-nombre').value = '';
        document.getElementById('nuevo-telefono').value = '';
        state.fotoNuevo = null;
        btnGuardar.disabled=false; btnGuardar.textContent='Registrar nuevo ingreso';
        mostrarToast(`✨ ${nombre} registrado!`);
      });
    }

    // Cargar stats si es hory en home
    if (state.usuario.rol === 'hory' && state.pantalla === 'home') {
      cargarStatsHory();
    }
  }

  window.cambiarPantalla = async function(pantalla) {
    state.pantalla = pantalla;
    state.busqueda = '';
    if (pantalla === 'asistencia') {
      await cargarCongregantes();
      await cargarAsistenciasHoy();
    }
    render();
  };

  window.irA = function(pantalla) {
    alert('Esta sección estará disponible próximamente 🚀\n\n→ ' + pantalla);
  };

  // ===== CARGAR USUARIO =====
  async function cargarUsuario() {
    if (!state.session) return;
    const { data } = await sb.from('usuarios').select('*').eq('id', state.session.user.id).single();
    state.usuario = data || null;
  }

  // ===== INIT =====
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    state.session = session;
    if (session) await cargarUsuario();
    state.loading = false;
    render();

    sb.auth.onAuthStateChange(async (event, session) => {
      state.session = session;
      if (session) { await cargarUsuario(); }
      else { state.usuario = null; }
      render();
    });
  }

  init();
</script>
</body>
</html>

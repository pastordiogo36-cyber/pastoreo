<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Pastoreo</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===== TODOS LOS ESTILOS EXISTENTES SE MANTIENEN ===== */
    :root {
      --rojo: #c0392b;
      --rojo-oscuro: #922b21;
      --rojo-claro: #e74c3c;
      --dorado: #f39c12;
      --verde: #27ae60;
      --negro: #0d0d0d;
      --gris-oscuro: #1a1a1a;
      --gris-medio: #2d2d2d;
      --gris-claro: #4a4a4a;
      --blanco: #fafafa;
      --texto-suave: #b0a090;
      --radio: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--negro);
      color: var(--blanco);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      overflow-x: hidden;
    }

    /* ===== LOGIN ===== */
    .login-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: radial-gradient(ellipse at 50% 20%, #3d0f0f 0%, var(--negro) 65%);
    }

    .logo-placeholder {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      border: none;
      margin-bottom: 12px;
    }

    .logo-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: 38px;
      font-weight: 900;
    }

    .app-subtitle {
      font-size: 13px;
      color: var(--texto-suave);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .login-card {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 32px 28px;
      width: 100%;
      margin-top: 40px;
    }

    .login-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .login-card p {
      color: var(--texto-suave);
      font-size: 14px;
      margin-bottom: 28px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--texto-suave);
      margin-bottom: 8px;
    }

    .input-group input,
    .input-group select,
    .input-group textarea {
      width: 100%;
      background: var(--gris-medio);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--blanco);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .input-group input:focus,
    .input-group select:focus,
    .input-group textarea:focus {
      border-color: var(--rojo);
    }

    .btn-primary {
      width: 100%;
      background: var(--rojo);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-primary:hover {
      background: var(--rojo-claro);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid var(--rojo);
      color: var(--rojo-claro);
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: rgba(192, 57, 43, 0.1);
    }

    .error-msg {
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid rgba(192, 57, 43, 0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #e74c3c;
      margin-top: 12px;
    }

    .success-msg {
      background: rgba(39, 174, 96, 0.15);
      border: 1px solid rgba(39, 174, 96, 0.3);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #2ecc71;
      margin-top: 12px;
    }

    /* ===== HEADER ===== */
    .app-header {
      background: var(--gris-oscuro);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--rojo);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }

    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 700;
    }

    .header-user {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.10);
      color: var(--blanco);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      user-select: none;
    }

    .rol-badge {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .rol-pastor {
      background: rgba(192, 57, 43, 0.2);
      color: var(--rojo-claro);
      border: 1px solid rgba(192, 57, 43, 0.3);
    }

    .rol-hory {
      background: rgba(192, 57, 43, 0.2);
      color: var(--rojo-claro);
      border: 1px solid rgba(192, 57, 43, 0.3);
    }

    .rol-nangareko {
      background: rgba(39, 174, 96, 0.2);
      color: #2ecc71;
      border: 1px solid rgba(39, 174, 96, 0.3);
    }

    .rol-lider_dc {
      background: rgba(52, 152, 219, 0.2);
      color: #3498db;
      border: 1px solid rgba(52, 152, 219, 0.3);
    }

    .btn-logout {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--texto-suave);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: var(--rojo);
      color: var(--rojo-claro);
    }

    /* ===== CONTENIDO ===== */
    .main-content {
      padding: 18px 18px 100px;
    }

    .welcome-banner {
      background: linear-gradient(135deg, var(--rojo-oscuro), var(--gris-medio));
      border-radius: var(--radio);
      padding: 22px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }

    .welcome-banner::after {
      content: '✝';
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 56px;
      opacity: 0.08;
    }

    .welcome-banner h2 {
      font-family: 'Playfair Display', serif;
      font-size: 21px;
      margin-bottom: 5px;
    }

    .welcome-banner p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }

    /* ===== MENÚ CARDS ===== */
    .menu-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }

    .menu-card {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .menu-card:hover {
      border-color: var(--rojo);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(192, 57, 43, 0.2);
    }

    .menu-card .icon {
      font-size: 32px;
    }

    .menu-card .card-title {
      font-size: 13px;
      font-weight: 600;
    }

    .menu-card .card-desc {
      font-size: 11px;
      color: var(--texto-suave);
      line-height: 1.4;
    }

    .menu-card-full {
      grid-column: 1 / -1;
    }

    /* ===== SECCIÓN HEADER ===== */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-header h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
    }

    .btn-back {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--texto-suave);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-back:hover {
      border-color: rgba(255, 255, 255, 0.3);
      color: var(--blanco);
    }

    /* ===== SERVICIO SELECTOR ===== */
    .servicio-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .servicio-btn {
      flex: 1;
      padding: 14px 10px;
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: var(--gris-oscuro);
      color: var(--texto-suave);
      border-radius: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      transition: all 0.2s;
    }

    .servicio-btn.active {
      border-color: var(--rojo);
      color: var(--blanco);
      background: rgba(192, 57, 43, 0.15);
    }

    .servicio-btn .dia {
      font-size: 16px;
      margin-bottom: 4px;
    }

    .servicio-btn .hora {
      font-size: 11px;
      color: var(--texto-suave);
      margin-top: 2px;
    }

    /* ===== LISTA CONGREGANTES ===== */
    .search-input {
      width: 100%;
      background: var(--gris-medio);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--blanco);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--rojo);
    }

    .congregante-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }

    .congregante-item.presente {
      border-color: rgba(39, 174, 96, 0.3);
      background: rgba(39, 174, 96, 0.05);
    }

    .congregante-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .congregante-foto {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--gris-medio);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      overflow: hidden;
      flex-shrink: 0;
      border: 2px solid rgba(255, 255, 255, 0.08);
    }

    .congregante-foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .congregante-nombre {
      font-size: 14px;
      font-weight: 500;
    }

    .congregante-estado {
      font-size: 11px;
      color: var(--texto-suave);
      margin-top: 2px;
    }

    .estado-nuevo {
      color: #f39c12;
    }

    .estado-en_proceso {
      color: #3498db;
    }

    .estado-graduado {
      color: #2ecc71;
    }

    /* ===== SWITCH ===== */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--gris-claro);
      transition: 0.3s;
      border-radius: 28px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 22px;
      width: 22px;
      left: 3px;
      bottom: 3px;
      background: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background: var(--verde);
    }

    input:checked+.slider:before {
      transform: translateX(22px);
    }

    /* ===== NUEVO INGRESO ===== */
    .nuevo-form {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 24px;
    }

    .foto-upload {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--gris-medio);
      border: 2px dashed rgba(255, 255, 255, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 0 auto 20px;
      font-size: 24px;
      transition: all 0.2s;
    }

    .foto-upload:hover {
      border-color: var(--rojo);
    }

    .foto-upload span {
      font-size: 10px;
      color: var(--texto-suave);
      margin-top: 4px;
    }

    .foto-upload img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* ===== ESTADÍSTICAS ===== */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }

    .stat-numero {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 11px;
      color: var(--texto-suave);
      margin-top: 4px;
    }

    /* ===== INFO SECTION ===== */
    .info-section {
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 20px;
      margin-bottom: 16px;
    }

    .info-section h3 {
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--texto-suave);
      margin-bottom: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 14px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-row .label {
      color: var(--texto-suave);
    }

    /* ===== COMING SOON ===== */
    .coming-soon {
      text-align: center;
      padding: 48px 24px;
      color: var(--texto-suave);
    }

    .coming-soon .big-icon {
      font-size: 56px;
      margin-bottom: 16px;
    }

    .coming-soon h3 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--blanco);
      margin-bottom: 8px;
    }

    .coming-soon p {
      font-size: 14px;
      line-height: 1.6;
    }

    .tag-etapa {
      display: inline-block;
      background: rgba(192, 57, 43, 0.15);
      border: 1px solid rgba(192, 57, 43, 0.3);
      color: var(--rojo-claro);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 20px;
      margin-top: 12px;
    }

    /* ===== LOADING ===== */
    .loading-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(192, 57, 43, 0.2);
      border-top-color: var(--rojo);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .setup-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      background: radial-gradient(ellipse at 50% 20%, #1a0a00 0%, var(--negro) 65%);
    }

    .setup-form {
      width: 100%;
      background: var(--gris-oscuro);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radio);
      padding: 28px;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--verde);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      animation: fadeInUp 0.3s ease;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      white-space: nowrap;
    }

    .toast.error {
      background: var(--rojo);
    }

    /* ===== MODAL ===== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--gris-oscuro);
      border-radius: var(--radio);
      padding: 24px;
      max-width: 90%;
      width: 400px;
      max-height: 80vh;
      overflow-y: auto;
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px) translateX(-50%);
      }

      to {
        opacity: 1;
        transform: translateY(0) translateX(-50%);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

  <div id="app"></div>

    let state = {

      pantalla: 'home',

      congregantes: [],

    // ============================================

    // ============================================

    // Toast notifications
    function mostrarToast(msg, tipo = 'ok') {
      const t = document.createElement('div');
      t.className = 'toast' + (tipo === 'error' ? ' error' : '');
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    // Sanitize user input (prevents XSS)
    function sanitizar(texto) {
      if (!texto) return '';
      const div = document.createElement('div');
      div.textContent = texto;
      return div.innerHTML;
    }

    // Debounce function to limit execution frequency (performance optimization)
    function debounce(fn, delay) {
      let timeoutId;
      return function (...args) {
        clearTimeout(timeoutId);
        timeoutId = setTimeout(() => {
          fn.apply(this, args);
        }, delay);
      };
    }

    function withTimeout(promise, ms, label) {
      let timeoutId;
      const timeoutPromise = new Promise((_, reject) => {
        timeoutId = setTimeout(() => {
          reject(new Error(`Timeout: ${label || 'operación'} (${ms}ms)`));
        }, ms);
      });
      return Promise.race([promise, timeoutPromise]).finally(() => clearTimeout(timeoutId));
    }

    function estadoLabel(estado) {
      const labels = { nuevo: '✨ Nuevo', en_proceso: '🔵 En proceso', en_anua: '📚 En Añua', bautizado: '💧 Bautizado', en_dc: '🏠 En DC', graduado: '🎓 Graduado', visita: '👋 Visita' };
      return labels[estado] || estado;
    }

    // ============================================
    // REALTIME AND AUTHENTICATION MANAGEMENT
    // ============================================

    // Load user profile from 'usuarios' table
    async function cargarUsuario() {
      if (!state.session) return;
      const { data } = await sb.from('usuarios').select('*').eq('id', state.session.user.id).single();
      state.usuario = data || null;
    }

    // Supabase Realtime Listener (for Ñangareko new alerts)
    function cleanupRealtimeListeners() {
      (realtimeChannels || []).forEach((ch) => {
        try { sb.removeChannel(ch); } catch (e) { /* noop */ }
      });
      realtimeChannels = [];
    }

    function setupRealtimeListeners() {
      cleanupRealtimeListeners();

      // Suscripción a la tabla 'congregantes' para notificar nuevos ingresos
      const alertasNuevosChannel = sb.channel('alertas-nuevos')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'congregantes' }, async (payload) => {
          const nuevoCongregante = payload.new;

          // 1. Verificar si el nuevo congregante es un "Nuevo" (estado 'nuevo')
          //    y si no tiene un ñangareko asignado aún (la alerta no se disparó antes)
          if (nuevoCongregante.estado === 'nuevo' && !nuevoCongregante.nangareko_id) {

            // 2. Si el usuario actual es un Ñangareko, actualiza su lista de alertas
            if (state.usuario?.rol === 'nangareko') {
              await cargarDatosNangareko();
              mostrarToast(`🚨 ¡Nuevo ingreso! ${nuevoCongregante.nombre}`);
              render();
            }
          }
        })
        .subscribe();

      // Suscripción general para mantener listas actualizadas (Hory / Pastor / Ñangareko / Líder DC)
      // Nota: esto depende de Realtime habilitado en Supabase para la tabla y de que RLS permita ver filas.
      const congregantesSyncChannel = sb.channel('congregantes-sync')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'congregantes' }, async () => {
          if (realtimeRefreshTimer) clearTimeout(realtimeRefreshTimer);
          realtimeRefreshTimer = setTimeout(async () => {
            if (realtimeRefreshInFlight) return;
            realtimeRefreshInFlight = true;
            try {
              await cargarCongregantes();
              if (state.usuario?.rol === 'nangareko') {
                await cargarDatosNangareko();
              }
              if (state.usuario?.rol === 'pastor') {
                await cargarDatosPastor();
              }
              if (state.usuario?.rol === 'lider_dc') {
                await cargarDatosLiderDC();
              }
              if (['asistencia', 'home', 'nangareko-alertas', 'nangareko-cuidados', 'lider-dc-asistencia'].includes(state.pantalla)) {
                render();
              }
            } finally {
              realtimeRefreshInFlight = false;
            }
          }, 500);
        })
        .subscribe();

      realtimeChannels.push(alertasNuevosChannel, congregantesSyncChannel);
    }

    // ============================================
    // RENDER AND NAVIGATION LOGIC
    // ============================================

    function render() {
      const app = document.getElementById('app');
      if (state.loading) { app.innerHTML = renderLoading(); return; }
      if (!state.session) { app.innerHTML = renderLogin(); bindLogin(); return; }
      if (!state.usuario) { app.innerHTML = renderSetup(); bindSetup(); return; }

      app.innerHTML = `
      ${renderHeader()}
      <div class="main-content">
        ${renderPantalla()}
      </div>`;
      bindApp();
    }

    window.cambiarPantalla = async function (pantalla) {
      // Navegación no-bloqueante: renderiza de inmediato y carga datos en segundo plano.
      // Esto evita que un request colgado deje la app "con botones muertos".
      if (navigationInFlight) return;
      navigationInFlight = true;

      const pantallaAnterior = state.pantalla;
      state.pantalla = pantalla;
      state.busqueda = '';
      render();

      try {
        if (pantallaAnterior === 'asistencia' && pantalla !== 'asistencia') {
          await withTimeout(guardarAsistencias(), 12000, 'guardar asistencias');
        }

        if (pantalla === 'asistencia') {
          await withTimeout(cargarCongregantes(), 12000, 'cargar congregantes');
          const cache = state.asistenciasPorServicio?.[state.servicioActivo];
          if (cache && Object.keys(cache).length > 0) {
            state.asistenciasHoy = { ...cache };
          } else {
            await withTimeout(cargarAsistenciasHoy(), 12000, 'cargar asistencias');
          }
        }

        if (pantalla === 'home') {
          if (state.usuario?.rol === 'pastor') await withTimeout(cargarDatosPastor(), 12000, 'cargar datos pastor');
          if (state.usuario?.rol === 'nangareko') await withTimeout(cargarDatosNangareko(), 12000, 'cargar datos ñangareko');
          if (state.usuario?.rol === 'lider_dc') await withTimeout(cargarDatosLiderDC(), 12000, 'cargar datos líder dc');
          if (state.usuario?.rol === 'hory') await withTimeout(cargarStatsHory(), 12000, 'cargar stats hory');
        }

        if (pantalla === 'lider-dc-asistencia') {
          state.asistenciaDCHoy = {};
        }
      } catch (e) {
        console.error('Error al cambiar de pantalla:', e);
        mostrarToast('⚠️ Ocurrió un error o la conexión está lenta. Probá de nuevo.', 'error');
      } finally {
        navigationInFlight = false;
        render();
      }
    };

    window.irA = function (pantalla) {
      alert('Esta sección estará disponible próximamente 🚀\n\n→ ' + pantalla);
    };

async function cargarDatosPastor() {
    if (!state.usuario || state.usuario.rol !== 'pastor') return;

    const fechaLimite = new Date();
    fechaLimite.setDate(fechaLimite.getDate() - 7);
    const fechaStr = fechaLimite.toISOString().split('T')[0];

    const [
      congregantesRes,
      lideresRes,
      nuevosRes,
      asistDomRes,
      asistMieRes,
      ultimosRes,
      alertasRes,
      gruposRes
    ] = await Promise.all([
      sb.from('congregantes').select('*'),
      sb.from('usuarios').select('id, nombre, email, rol').order('nombre', { ascending: true }),
      sb.from('congregantes').select('id', { count: 'exact' }).gte('created_at', fechaStr),
      sb.from('asistencias').select('presente').eq('tipo_servicio', 'domingo').gte('fecha', fechaStr),
      sb.from('asistencias').select('presente').eq('tipo_servicio', 'miercoles').gte('fecha', fechaStr),
      sb.from('congregantes').select('nombre, created_at').order('created_at', { ascending: false }).limit(5),
      sb.from('alertas').select('tipo, mensaje, created_at').order('created_at', { ascending: false }).limit(5),
      sb.from('grupos_dc').select('*, lider:lider_id(nombre)').order('created_at', { ascending: false })
    ]);

    if (congregantesRes.error) {
      console.error('Error al cargar congregantes (Pastor):', congregantesRes.error);
      mostrarToast('⚠️ No se pudieron cargar congregantes (ver permisos/RLS)', 'error');
      state.congregantes = [];
    } else {
      state.congregantes = congregantesRes.data || [];
    }

    if (lideresRes.error) {
      console.error('Error al cargar usuarios/líderes (Pastor):', lideresRes.error);
      state.lideres = [];
    } else {
      state.lideres = lideresRes.data || [];
    }

    if (nuevosRes.error) {
      console.error('Error al cargar nuevos (Pastor):', nuevosRes.error);
      state.nuevosUltimaSemana = 0;
    } else {
      state.nuevosUltimaSemana = nuevosRes.data?.length || 0;
    }

    const asistenciasDomingo = asistDomRes.error ? [] : (asistDomRes.data || []);
    const asistenciasMiercoles = asistMieRes.error ? [] : (asistMieRes.data || []);
    if (asistDomRes.error) console.error('Error al cargar asistencias domingo (Pastor):', asistDomRes.error);
    if (asistMieRes.error) console.error('Error al cargar asistencias miércoles (Pastor):', asistMieRes.error);

    const todasAsistencias = [...asistenciasDomingo, ...asistenciasMiercoles];
    if (todasAsistencias.length > 0) {
      const presentes = todasAsistencias.filter(a => a.presente).length;
      state.asistenciaPromedio = Math.round((presentes / todasAsistencias.length) * 100);
    } else {
      state.asistenciaPromedio = 0;
    }

    if (ultimosRes.error) {
      console.error('Error al cargar últimos ingresos (Pastor):', ultimosRes.error);
      state.ultimosCongregantes = [];
    } else {
      state.ultimosCongregantes = ultimosRes.data || [];
    }

    if (alertasRes.error) {
      console.error('Error al cargar alertas (Pastor):', alertasRes.error);
      state.alertasRecientes = [];
    } else {
      state.alertasRecientes = alertasRes.data || [];
    }

    if (gruposRes.error) {
      console.error('Error al cargar grupos DC (Pastor):', gruposRes.error);
      state.gruposDC = [];
    } else {
      state.gruposDC = gruposRes.data || [];
    }

    setTimeout(() => dibujarGraficoAsistencia(), 100);
}

    function dibujarGraficoAsistencia() {
      const canvas = document.getElementById('asistenciaChart');
      if (!canvas) return;

      const diasSemana = ['Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb', 'Dom'];
      const asistenciasPorDia = [65, 70, 82, 68, 72, 85, 90];

      new Chart(canvas, {
        type: 'line',
        data: {
          labels: diasSemana,
          datasets: [{
            label: 'Asistencia %',
            data: asistenciasPorDia,
            borderColor: '#c0392b',
            backgroundColor: 'rgba(192, 57, 43, 0.1)',
            tension: 0.3,
            fill: true
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { labels: { color: '#b0a090' } }
          },
          scales: {
            y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#b0a090' } },
            x: { ticks: { color: '#b0a090' } }
          }
        }
      });
    }

      const dia = prompt('Día de reunión (ej: Martes):');

    window.asignarLiderGrupo = async function (grupoId) {
      const lideres = state.lideres?.filter(l => l.rol === 'lider_dc') || [];
      if (lideres.length === 0) {
        mostrarToast('No hay líderes DC registrados', 'error');
        return;
      }

      const lista = lideres.map((l, i) => `${i + 1}. ${l.nombre} (${l.email})`).join('\n');
      const seleccion = prompt(`Seleccioná un líder para este grupo:\n\n${lista}\n\nEscribí el número:`);
      const idx = parseInt(seleccion) - 1;
      if (idx >= 0 && idx < lideres.length) {
        await sb.from('grupos_dc').update({ lider_id: lideres[idx].id }).eq('id', grupoId);
        mostrarToast(`✅ Líder asignado`);
        await cargarDatosPastor();
        cambiarPantalla('pastor-grupos');
      }
    };

    window.asignarMiembrosGrupo = async function (grupoId, grupoNombre) {
      const miembrosDisponibles = state.congregantes.filter(c => !c.grupo_dc_id);
      if (miembrosDisponibles.length === 0) {
        mostrarToast('No hay miembros disponibles para asignar', 'error');
        return;
      }

      const lista = miembrosDisponibles.map((m, i) => `${i + 1}. ${m.nombre} (${m.estado})`).join('\n');
      const seleccion = prompt(`Asignar miembro a "${grupoNombre}":\n\n${lista}\n\nEscribí el número (0 para terminar):`);
      const idx = parseInt(seleccion) - 1;
      if (idx >= 0 && idx < miembrosDisponibles.length) {
        await sb.from('congregantes').update({ grupo_dc_id: grupoId }).eq('id', miembrosDisponibles[idx].id);
        mostrarToast(`✅ ${miembrosDisponibles[idx].nombre} asignado al grupo`);
        await cargarCongregantes();
        await cargarDatosPastor();
        asignarMiembrosGrupo(grupoId, grupoNombre);
      }
    };

    function actualizarCongreganteEnColecciones(congreganteId, patch) {
      const colecciones = [
        state.congregantes,
        state.misCuidados,
        state.alertasNuevos,
        state.miembrosGrupo
      ];

      for (const col of colecciones) {
        if (!Array.isArray(col)) continue;
        const idx = col.findIndex(c => c?.id === congreganteId);
        if (idx >= 0) col[idx] = { ...col[idx], ...patch };
      }
    }

    window.agregarEventoLocal = function () {
      const titulo = prompt('Título del evento:');
      if (!titulo) return;
      const fecha = prompt('Fecha (YYYY-MM-DD):');
      if (!fecha) return;
      const hora = prompt('Hora (opcional, ej: 19:30):') || '';

      let eventos = [];
      try {
        eventos = JSON.parse(localStorage.getItem('pastoreo_cal_events') || '[]');
        if (!Array.isArray(eventos)) eventos = [];
      } catch {
        eventos = [];
      }

      eventos.unshift({ id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()), titulo, fecha, hora });
      localStorage.setItem('pastoreo_cal_events', JSON.stringify(eventos));
      render();
    };

    window.eliminarEventoLocal = function (eventId) {
      let eventos = [];
      try {
        eventos = JSON.parse(localStorage.getItem('pastoreo_cal_events') || '[]');
        if (!Array.isArray(eventos)) eventos = [];
      } catch {
        eventos = [];
      }
      eventos = eventos.filter(e => e?.id !== eventId);
      localStorage.setItem('pastoreo_cal_events', JSON.stringify(eventos));
      render();
    };

    async function cargarDatosNangareko() {
      if (!state.usuario || state.usuario.rol !== 'nangareko') return;

      const userId = state.usuario.id;

      const [
        misCuidadosRes,
        nuevosSinAsignarRes,
        gruposRes
      ] = await Promise.all([
        sb.from('congregantes')
          .select('*')
          .eq('nangareko_id', userId)
          .order('created_at', { ascending: false }),
        sb.from('congregantes')
          .select('*')
          .is('nangareko_id', null)
          .eq('estado', 'nuevo')
          .order('created_at', { ascending: false }),
        sb.from('grupos_dc').select('id, nombre').order('nombre', { ascending: true })
      ]);

      state.misCuidados = misCuidadosRes?.data || [];
      state.alertasNuevos = nuevosSinAsignarRes?.data || [];

      if (gruposRes?.error) {
        console.error('Error al cargar grupos DC (Ñangareko):', gruposRes.error);
      } else {
        state.gruposDC = gruposRes.data || [];
      }

      const fechaLimite = new Date();
      fechaLimite.setDate(fechaLimite.getDate() - 7);
      const fechaStr = fechaLimite.toISOString().split('T')[0];

      const { data: contactos } = await sb.from('fichas_nangareko')
        .select('id', { count: 'exact' })
        .eq('nangareko_id', userId)
        .gte('created_at', fechaStr);
      state.contactosSemana = contactos?.length || 0;

      const { data: ultimosContactos } = await sb.from('fichas_nangareko')
        .select('*, congregantes(nombre)')
        .eq('nangareko_id', userId)
        .order('created_at', { ascending: false })
        .limit(5);

      const container = document.getElementById('ultimos-contactos');
      if (container) {
        if (ultimosContactos && ultimosContactos.length > 0) {
          container.innerHTML = ultimosContactos.map(f => `
          <div class="info-row">
            <span class="label">${f.congregantes?.nombre || 'Desconocido'}</span>
            <span style="font-size:12px">${f.tipo_contacto} · ${new Date(f.created_at).toLocaleDateString()}</span>
          </div>
        `).join('');
        } else {
          container.innerHTML = '<div class="info-row"><span class="label">No hay contactos registrados aún</span></div>';
        }
      }
    }

    window.asignarACargo = async function (congreganteId, nombre) {
      const userId = state.usuario.id;

      const { error } = await sb.from('congregantes')
        .update({ nangareko_id: userId, estado: 'en_proceso' })
        .eq('id', congreganteId);

      if (error) {
        mostrarToast('Error al asignar', 'error');
        return;

    window.guardarFichaContacto = async function (congreganteId) {
      const tipo = document.getElementById('ficha-tipo')?.value;
      const versiculo = document.getElementById('ficha-versiculo')?.value;
      const estadoAnimo = document.getElementById('ficha-animo')?.value;
      const motivoOracion = document.getElementById('ficha-oracion')?.value;
      const notas = document.getElementById('ficha-notas')?.value;
      const esPorAusencia = document.getElementById('ficha-por-ausencia')?.checked || false;

      const { error } = await sb.from('fichas_nangareko').insert({
        congregante_id: congreganteId,
        nangareko_id: state.usuario.id,
        tipo_contacto: tipo,
        versiculo_compartido: versiculo || null,
        estado_animo: estadoAnimo,
        motivo_oracion: motivoOracion || null,
        notas_adicionales: notas || null,
        es_por_ausencia: esPorAusencia
      });

      if (error) {
        mostrarToast('Error al guardar', 'error');
        return;

      mostrarToast('✅ Contacto registrado correctamente');

      state.congreganteSeleccionado = null;
      await cargarDatosNangareko();
      cambiarPantalla('home');

    window.verHistorialFichas = async function (congreganteId) {
      const { data: historial } = await sb.from('fichas_nangareko')
        .select('*')
        .eq('congregante_id', congreganteId)
        .order('created_at', { ascending: false });

      const congregante = state.misCuidados?.find(c => c.id === congreganteId);
      const nombre = congregante?.nombre || 'Desconocido';

      if (!historial || historial.length === 0) {
        mostrarToast(`📭 ${nombre} - No hay contactos registrados aún`);
        return;
      }

      const resumen = historial.slice(0, 5).map(f =>
        `📅 ${new Date(f.created_at).toLocaleDateString()}: ${f.tipo_contacto} - Ánimo: ${f.estado_animo}`
      ).join('\n');

      alert(`📜 Historial de ${nombre}:\n\n${resumen}\n\n${historial.length > 5 ? `... y ${historial.length - 5} más` : ''}`);
    };

        .select('*')
        .eq('lider_id', userId)
        .single();
      state.miGrupo = grupo || null;

      if (state.miGrupo) {
        const { data: miembros } = await sb.from('congregantes')
          .select('*')
          .eq('grupo_dc_id', state.miGrupo.id)
          .order('nombre');
        state.miembrosGrupo = miembros || [];
      } else {
        state.miembrosGrupo = [];
      }

      const { data: ultimosContactos } = await sb.from('fichas_dc')
        .select('*, congregantes(nombre)')
        .eq('lider_id', userId)
        .order('created_at', { ascending: false })
        .limit(5);

      const container = document.getElementById('ultimos-contactos-dc');
      if (container) {
        if (ultimosContactos && ultimosContactos.length > 0) {
          container.innerHTML = ultimosContactos.map(f => `
          <div class="info-row">
            <span class="label">${f.congregantes?.nombre || 'Desconocido'}</span>
            <span style="font-size:12px">${f.tipo_contacto} · ${new Date(f.created_at).toLocaleDateString()}</span>
          </div>
        `).join('');
        } else {
          container.innerHTML = '<div class="info-row"><span class="label">No hay contactos registrados aún</span></div>';

            <textarea id="dc-ficha-mejora" rows="2" style="width:100%; background:var(--gris-medio); border:none; border-radius:8px; padding:12px; color:white" placeholder="En qué necesita crecer..."></textarea>
          </div>
          
          <div class="input-group">
            <label>Notas adicionales</label>
            <textarea id="dc-ficha-notas" rows="2" style="width:100%; background:var(--gris-medio); border:none; border-radius:8px; padding:12px; color:white"></textarea>
          </div>
          
          <label style="display:flex; align-items:center; gap:8px; margin-bottom:20px">
            <input type="checkbox" id="dc-ficha-por-ausencia" />
            <span style="font-size:13px">⚠️ Este contacto es porque la persona faltó a la reunión</span>
          </label>
          
          <button class="btn-primary" onclick="guardarFichaDC('${targetId}')">✅ Guardar contacto</button>
        </div>
      </div>
    `;
    }

    window.seleccionarMiembroFichaDC = function (id, nombre) {
      state.liderDCSeleccionado = { id, nombre };
      cambiarPantalla('lider-dc-fichas');
    };

    window.guardarFichaDC = async function (congreganteId) {
      const tipo = document.getElementById('dc-ficha-tipo')?.value;
      const versiculo = document.getElementById('dc-ficha-versiculo')?.value;
      const vidaEspiritual = document.getElementById('dc-ficha-espiritual')?.value;
      const areasMejora = document.getElementById('dc-ficha-mejora')?.value;
      const notas = document.getElementById('dc-ficha-notas')?.value;
      const esPorAusencia = document.getElementById('dc-ficha-por-ausencia')?.checked || false;

      const { error } = await sb.from('fichas_dc').insert({
        congregante_id: congreganteId,
        lider_id: state.usuario.id,
        tipo_contacto: tipo,
        versiculo_compartido: versiculo || null,
        vida_espiritual: vidaEspiritual || null,
        areas_mejora: areasMejora || null,
        notas_adicionales: notas || null,
        es_por_ausencia: esPorAusencia
      });

      if (error) {
        mostrarToast('Error al guardar', 'error');
        return;
      }

      mostrarToast('✅ Contacto registrado correctamente');

      state.liderDCSeleccionado = null;
      await cargarDatosLiderDC();
      cambiarPantalla('home');
    };

    window.abrirFichaDC = function (id, nombre) {
      state.liderDCSeleccionado = { id, nombre };
      cambiarPantalla('lider-dc-fichas');
    };

    window.verHistorialFichasDC = async function (congreganteId) {
      const { data: historial } = await sb.from('fichas_dc')
        .select('*')
        .eq('congregante_id', congreganteId)
        .order('created_at', { ascending: false });

      const miembro = state.miembrosGrupo?.find(m => m.id === congreganteId);
      const nombre = miembro?.nombre || 'Desconocido';

      if (!historial || historial.length === 0) {
        mostrarToast(`📭 ${nombre} - No hay contactos registrados aún`);
        return;
      }

      const resumen = historial.slice(0, 5).map(f =>
        `📅 ${new Date(f.created_at).toLocaleDateString()}: ${f.tipo_contacto}`
      ).join('\n');

      alert(`📜 Historial de ${nombre}:\n\n${resumen}\n\n${historial.length > 5 ? `... y ${historial.length - 5} más` : ''}`);
    };

    // ============================================
    // SECCIÓN HORY DASHBOARD & LOGIC
    // ============================================

    function renderHomeHory() {
      const u = state.usuario;
      const hora = new Date().getHours();
      const saludo = hora < 12 ? 'Buenos días' : hora < 19 ? 'Buenas tardes' : 'Buenas noches';
      const hoy = new Date();
      const diaSemana = hoy.getDay();
      const esServicio = diaSemana === 3 || diaSemana === 0;
      const tipoServicio = diaSemana === 3 ? 'Miércoles' : diaSemana === 0 ? 'Domingo' : '';

      return `
      <div class="main-content">
        <div class="welcome-banner">
          <h2>${saludo}, ${u.nombre.split(' ')[0]} 👋</h2>
          <p>Panel del <strong>Hory</strong> — Asistencias</p>
        </div>

        ${esServicio ? `
          <div style="background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
            <span style="font-size:24px">🟢</span>
            <div>
              <div style="font-size:14px;font-weight:600;color:#2ecc71">¡Hoy hay servicio!</div>
              <div style="font-size:12px;color:var(--texto-suave)">Servicio del ${tipoServicio}</div>
            </div>
          </div>` : `
          <div style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px">
            <span style="font-size:24px">📅</span>
            <div>
              <div style="font-size:14px;font-weight:500">Próximos servicios</div>
              <div style="font-size:12px;color:var(--texto-suave)">Miércoles 19:30 · Domingo 09:00</div>
            </div>
          </div>`}

        <div class="menu-grid">
          <div class="menu-card menu-card-full" onclick="cambiarPantalla('asistencia')">
            <div class="icon">✅</div>
            <div class="card-title">Tomar asistencia</div>
            <div class="card-desc">Marcá presentes y ausentes del servicio de hoy</div>
          </div>
          <div class="menu-card menu-card-full" onclick="cambiarPantalla('nuevo-ingreso')">
            <div class="icon">➕</div>
            <div class="card-title">Nuevo ingreso</div>
            <div class="card-desc">Registrá a alguien que viene por primera vez</div>
          </div>
        </div>

        <div id="stats-hory">
          <div style="text-align:center;color:var(--texto-suave);font-size:13px;padding:20px"></div>
        </div>
      </div>`;
    }

    function renderAsistencia() {
      const filtrados = state.congregantes.filter(c =>
        c.nombre.toLowerCase().includes(state.busqueda.toLowerCase())
      );
      const presentes = Object.values(state.asistenciasHoy).filter(Boolean).length;
      const esHory = state.usuario?.rol === 'hory';

      return `
      <div class="section-header">
        <h3>Asistencia</h3>
        <button class="btn-back" onclick="cambiarPantalla('home')">← Volver</button>
      </div>

      <div class="servicio-selector">
        <div class="servicio-btn ${state.servicioActivo === 'miercoles' ? 'active' : ''}" onclick="cambiarServicio('miercoles')">
          <div class="dia">📖</div>
          <div>Miércoles</div>
          <div class="hora">19:30</div>
        </div>
        <div class="servicio-btn ${state.servicioActivo === 'domingo' ? 'active' : ''}" onclick="cambiarServicio('domingo')">
          <div class="dia">⛪</div>
          <div>Domingo</div>
          <div class="hora">09:00</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-numero">${state.congregantes.length}</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-numero" style="color:var(--verde)">${presentes}</div>
          <div class="stat-label">Presentes</div>
        </div>
        <div class="stat-card">
          <div class="stat-numero" style="color:var(--rojo-claro)">${state.congregantes.length - presentes}</div>
          <div class="stat-label">Ausentes</div>
        </div>
      </div>

      <input class="search-input" type="text" placeholder="🔍 Buscar congregante..." 
        value="${state.busqueda}" oninput="debouncedFiltrarBusqueda(this.value)" />

      <div id="lista-congregantes">
        ${filtrados.length === 0 ?
          `<div style="text-align:center;color:var(--texto-suave);padding:32px;font-size:14px">
            ${state.congregantes.length === 0 ? 'No hay congregantes registrados aún.' : 'No se encontraron resultados.'}
          </div>` :
          filtrados.map(c => {
            const presente = state.asistenciasHoy[c.id] || false;
            const iniciales = c.nombre.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
            return `
              <div class="congregante-item ${presente ? 'presente' : ''}" id="item-${c.id}">
                <div class="congregante-left">
                  <div class="congregante-foto">
                    ${c.foto_url ? `<img src="${c.foto_url}" alt="${c.nombre}" />` : iniciales}
                  </div>
                  <div>
                    <div class="congregante-nombre">${c.nombre}</div>
                    ${esHory ? '' : `<div class="congregante-estado estado-${c.estado}">${estadoLabel(c.estado)}</div>`}
                  </div>
                </div>
                <label class="switch">
                  <input type="checkbox" ${presente ? 'checked' : ''} onchange="toggleAsistencia('${c.id}', this.checked)" />
                  <span class="slider"></span>
                </label>
              </div>`;
          }).join('')
        }
      </div>`;
    }

    function renderNuevoIngreso() {
      return `
      <div class="section-header">
        <h3>Nuevo ingreso</h3>
        <button class="btn-back" onclick="cambiarPantalla('home')">← Volver</button>
      </div>

      <div class="nuevo-form">
        <div style="text-align:center;margin-bottom:20px">
          <div class="foto-upload" id="foto-upload-btn" onclick="document.getElementById('foto-input').click()">
            <div id="foto-preview">📷</div>
            <span>Foto (opcional)</span>
          </div>
          <input type="file" id="foto-input" accept="image/*" style="display:none" onchange="previsualizarFoto(this)" />
        </div>

        <div class="input-group">
          <label>Nombre completo *</label>
          <input type="text" id="nuevo-nombre" placeholder="Nombre y apellido" />
        </div>
        <div class="input-group">
          <label>Teléfono (opcional)</label>
          <input type="tel" id="nuevo-telefono" placeholder="0981 000 000" />
        </div>
        <div class="input-group">
          <label>Servicio en el que ingresó</label>
          <select id="nuevo-servicio">
            <option value="domingo">Domingo 09:00</option>
            <option value="miercoles">Miércoles 19:30</option>
          </select>
        </div>

        <button class="btn-primary" id="btn-guardar-nuevo">Registrar nuevo ingreso</button>
        <div id="nuevo-error" style="display:none" class="error-msg"></div>
        <div id="nuevo-exito" style="display:none" class="success-msg"></div>
      </div>`;
    }

    // Function to handle changing service in attendance screen
    window.cambiarServicio = async function (servicio) {
      if (serviceChangeInFlight) return;
      serviceChangeInFlight = true;

      try {
        // Guardar antes de cambiar, para no perder el trabajo si el Hory navega entre servicios
        await withTimeout(guardarAsistencias(), 12000, 'guardar asistencias');

        state.servicioActivo = servicio;

        // Si ya tenemos cache local del servicio, úsalo; si no, carga desde DB
        const cache = state.asistenciasPorServicio?.[servicio];
        if (cache && Object.keys(cache).length > 0) {
          state.asistenciasHoy = { ...cache };
        } else {
          await withTimeout(cargarAsistenciasHoy(), 12000, 'cargar asistencias');
        }

        render();

        // Update service buttons UI
        document.querySelectorAll('.servicio-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.querySelector(`.servicio-btn[onclick="cambiarServicio('${servicio}')"]`);
        if (activeBtn) activeBtn.classList.add('active');
      } catch (e) {
        console.error('Error al cambiar servicio:', e);
        mostrarToast('⚠️ Error al cambiar servicio. Probá de nuevo.', 'error');
      } finally {
        serviceChangeInFlight = false;
      }
    };

    /**
     * Filters the congregant list based on the search input value.
     * This function is called by the debounced version to avoid excessive updates.
     */
    window.filtrarBusqueda = function (valor) {
      state.busqueda = valor;
      const lista = document.getElementById('lista-congregantes');
      if (!lista) return;

      const esHory = state.usuario?.rol === 'hory';

      const filtrados = state.congregantes.filter(c =>
        c.nombre.toLowerCase().includes(valor.toLowerCase())
      );

      lista.innerHTML = filtrados.length === 0 ?
        `<div style="text-align:center;color:var(--texto-suave);padding:32px;font-size:14px">No se encontraron resultados.</div>` :
        filtrados.map(c => {
          const presente = state.asistenciasHoy[c.id] || false;
          const iniciales = c.nombre.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
          return `
        <div class="congregante-item ${presente ? 'presente' : ''}" id="item-${c.id}">
          <div class="congregante-left">
            <div class="congregante-foto">${c.foto_url ? `<img src="${c.foto_url}" />` : sanitizar(iniciales)}</div>
            <div>
              <div class="congregante-nombre">${sanitizar(c.nombre)}</div>
              ${esHory ? '' : `<div class="congregante-estado estado-${c.estado}">${estadoLabel(c.estado)}</div>`}
            </div>
          </div>
          <label class="switch">
            <input type="checkbox" ${presente ? 'checked' : ''} onchange="toggleAsistencia('${c.id}', this.checked)" />
            <span class="slider"></span>
          </label>
        </div>`;
        }).join('');
    };

    // Performance Optimization: Debounce for search input to prevent excessive DOM manipulation
    // NOTE: This definition MUST appear AFTER the definition of `filtrarBusqueda` to avoid ReferenceError.
    window.debouncedFiltrarBusqueda = debounce(filtrarBusqueda, 300);

    /**
     * Updates local state and UI for attendance. Does NOT save to database immediately.
     * @param {string} congreganteId - ID of the congregant.
     * @param {boolean} presente - True if present, false otherwise.
     */
    window.toggleAsistencia = function (congreganteId, presente) {
      state.asistenciasHoy[congreganteId] = presente;
      if (!state.asistenciasPorServicio) state.asistenciasPorServicio = { domingo: {}, miercoles: {} };
      if (!state.asistenciasPorServicio[state.servicioActivo]) state.asistenciasPorServicio[state.servicioActivo] = {};
      state.asistenciasPorServicio[state.servicioActivo][congreganteId] = presente;

      const item = document.getElementById('item-' + congreganteId);
      if (item) {
        if (presente) {
          item.classList.add('presente');
        } else {
          item.classList.remove('presente');
        }
      }

      const presentes = Object.values(state.asistenciasHoy).filter(Boolean).length;
      const statsCards = document.querySelectorAll('.stats-row .stat-card');
      if (statsCards.length >= 3) {
        const presentesCard = statsCards[1]?.querySelector('.stat-numero');
        const ausentesCard = statsCards[2]?.querySelector('.stat-numero');
        if (presentesCard) presentesCard.textContent = presentes;
        if (ausentesCard) ausentesCard.textContent = state.congregantes.length - presentes;
      }
    };

    /**
     * Saves all local attendance changes (from state.asistenciasHoy) to the database.
     * This is called when exiting the attendance screen.
     */
    window.guardarAsistencias = async function () {
      try {
        const hoy = new Date().toISOString().split('T')[0];
        const asistenciasAPendientes = [];

        for (const [congreganteId, presente] of Object.entries(state.asistenciasHoy)) {
          asistenciasAPendientes.push({
            congregante_id: congreganteId,
            tipo_servicio: state.servicioActivo,
            fecha: hoy,
            presente: presente,
            registrado_por: state.usuario.id
          });
        }

        if (asistenciasAPendientes.length === 0) return;

        const { error } = await withTimeout(
          sb.from('asistencias').upsert(asistenciasAPendientes, {
            onConflict: 'congregante_id,tipo_servicio,fecha'
          }),
          12000,
          'guardar asistencias'
        );

        if (error) {
          console.error('Error al guardar asistencias:', error);
          mostrarToast('⚠️ No se pudieron guardar las asistencias', 'error');
          return;
        }

        if (!state.asistenciasPorServicio) state.asistenciasPorServicio = { domingo: {}, miercoles: {} };
        state.asistenciasPorServicio[state.servicioActivo] = { ...state.asistenciasHoy };
      } catch (e) {
        console.error('Error inesperado al guardar asistencias:', e);
        mostrarToast('⚠️ No se pudieron guardar las asistencias', 'error');
      }
    };

    window.addEventListener('error', (event) => {
      try {
        console.error('Error global:', event?.error || event);
      } catch (e) { /* noop */ }
    });

    window.addEventListener('unhandledrejection', (event) => {
      try {
        console.error('Promise rechazada sin manejar:', event?.reason || event);
        mostrarToast('⚠️ Ocurrió un error interno. Probá refrescar si persiste.', 'error');
      } catch (e) { /* noop */ }
    });

    window.previsualizarFoto = function (input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => {
          state.fotoNuevo = e.target.result;
          const preview = document.getElementById('foto-preview');
          if (preview) preview.innerHTML = `<img src="${e.target.result}" style="width:80px;height:80px;object-fit:cover;border-radius:50%" />`;
          const btn = document.getElementById('foto-upload-btn');
          if (btn) btn.querySelector('span').textContent = 'Cambiar foto';
        };
        reader.readAsDataURL(input.files[0]);
      }
    };

    async function cargarCongregantes() {
      const { data, error } = await sb.from('congregantes').select('*').order('nombre');
      if (error) {
        console.error('Error al cargar congregantes:', error);
        mostrarToast('⚠️ No se pudieron cargar los congregantes (ver permisos/RLS)', 'error');
        state.congregantes = [];
        return;
      }
      state.congregantes = data || [];
    }

    async function cargarAsistenciasHoy() {
      const hoy = new Date().toISOString().split('T')[0];
      const { data, error } = await sb.from('asistencias')
        .select('congregante_id, presente')
        .eq('tipo_servicio', state.servicioActivo)
        .eq('fecha', hoy);
      if (error) {
        console.error('Error al cargar asistencias:', error);
        mostrarToast('⚠️ No se pudieron cargar asistencias (ver permisos/RLS)', 'error');
      }
      state.asistenciasHoy = {};
      (data || []).forEach(a => { state.asistenciasHoy[a.congregante_id] = a.presente; });
      if (!state.asistenciasPorServicio) state.asistenciasPorServicio = { domingo: {}, miercoles: {} };
      state.asistenciasPorServicio[state.servicioActivo] = { ...state.asistenciasHoy };
    }

    async function cargarStatsHory() {
      const el = document.getElementById('stats-hory');
      if (!el) return;
      await cargarCongregantes();
      const hoy = new Date().toISOString().split('T')[0];
      const { data: asist } = await sb.from('asistencias').select('presente').eq('fecha', hoy);
      const presentes = (asist || []).filter(a => a.presente).length;
      const nuevos = state.congregantes.filter(c => c.estado === 'nuevo').length;
      el.innerHTML = `
      <div class="stats-row">
        <div class="stat-card"><div class="stat-numero">${state.congregantes.length}</div><div class="stat-label">Congregantes</div></div>
        <div class="stat-card"><div class="stat-numero" style="color:var(--verde)">${presentes}</div><div class="stat-label">Hoy presentes</div></div>
        <div class="stat-card"><div class="stat-numero" style="color:var(--dorado)">${nuevos}</div><div class="stat-label">Nuevos</div></div>
      </div>`;
    }

    // Initialize application when DOM is ready
    document.addEventListener('DOMContentLoaded', init);

    // Initial app load function
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      state.session = session;

      if (session) {
        await cargarUsuario();
        setupRealtimeListeners();

        if (state.usuario?.rol === 'pastor') await cargarDatosPastor();
        if (state.usuario?.rol === 'nangareko') await cargarDatosNangareko();
        if (state.usuario?.rol === 'lider_dc') await cargarDatosLiderDC();
        if (state.usuario?.rol === 'hory') await cargarStatsHory();
      }

      state.loading = false;
      render();

      sb.auth.onAuthStateChange(async (event, session) => {
        state.session = session;
        if (session) {
          await cargarUsuario();
          setupRealtimeListeners();

          if (state.usuario?.rol === 'pastor') await cargarDatosPastor();
          if (state.usuario?.rol === 'nangareko') await cargarDatosNangareko();
          if (state.usuario?.rol === 'lider_dc') await cargarDatosLiderDC();
          if (state.usuario?.rol === 'hory') await cargarStatsHory();
        } else {
          state.usuario = null;
          cleanupRealtimeListeners();
        }
        render();
      });
    }
  </script>
</body>

</html>
